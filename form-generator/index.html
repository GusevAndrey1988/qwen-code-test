<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Веб Форм</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            grid-column: 1 / -1;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .field-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .field-type {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .preview-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
        }

        .preview-form .form-group {
            margin-bottom: 20px;
        }

        .preview-form input,
        .preview-form select,
        .preview-form textarea {
            background: white;
        }

        .code-output {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            cursor: pointer;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Генератор Веб Форм</h1>
        
        <!-- Левая панель - Конструктор -->
        <div class="panel">
            <h2>📝 Добавить поле</h2>
            
            <div class="form-group">
                <label for="fieldType">Тип поля:</label>
                <select id="fieldType">
                    <option value="text">Текстовое поле</option>
                    <option value="email">Email</option>
                    <option value="password">Пароль</option>
                    <option value="number">Число</option>
                    <option value="tel">Телефон</option>
                    <option value="textarea">Текстовая область</option>
                    <option value="select">Выпадающий список</option>
                    <option value="checkbox">Чекбокс</option>
                    <option value="radio">Радио кнопки</option>
                    <option value="date">Дата</option>
                    <option value="file">Файл</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fieldName">Название поля (name):</label>
                <input type="text" id="fieldName" placeholder="например: username">
            </div>

            <div class="form-group">
                <label for="fieldLabel">Метка (label):</label>
                <input type="text" id="fieldLabel" placeholder="например: Имя пользователя">
            </div>

            <div class="form-group">
                <label for="fieldPlaceholder">Плейсхолдер:</label>
                <input type="text" id="fieldPlaceholder" placeholder="например: Введите имя">
            </div>

            <div class="form-group">
                <label for="fieldRequired">Обязательное поле:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="fieldRequired">
                    <span>Да</span>
                </div>
            </div>

            <div class="form-group" id="optionsGroup" style="display: none;">
                <label for="fieldOptions">Опции (через запятую):</label>
                <input type="text" id="fieldOptions" placeholder="Опция 1, Опция 2, Опция 3">
            </div>

            <button onclick="addField()">➕ Добавить поле</button>
            <button class="danger" onclick="clearAll()">🗑️ Очистить всё</button>

            <h2 style="margin-top: 30px;">📋 Список полей</h2>
            <div id="fieldsList"></div>
        </div>

        <!-- Правая панель - Предпросмотр -->
        <div class="panel">
            <h2>👁️ Предпросмотр</h2>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('preview')">Предпросмотр</button>
                <button class="tab" onclick="switchTab('html')">HTML Код</button>
                <button class="tab" onclick="switchTab('css')">CSS Код</button>
            </div>

            <div id="preview" class="tab-content active">
                <form id="previewForm" class="preview-form" onsubmit="return false;">
                    <p style="color: #999; text-align: center;">Добавьте поля для предпросмотра</p>
                </form>
            </div>

            <div id="html" class="tab-content">
                <div class="code-output" id="htmlCode"></div>
            </div>

            <div id="css" class="tab-content">
                <div class="code-output" id="cssCode"></div>
            </div>

            <button class="success" onclick="copyHTML()" style="margin-top: 20px;">📋 Копировать HTML</button>
            <button class="success" onclick="downloadForm()">💾 Скачать форму</button>
        </div>
    </div>

    <script>
        let fields = [];

        // Показать/скрыть поле опций для select, checkbox, radio
        document.getElementById('fieldType').addEventListener('change', function() {
            const optionsGroup = document.getElementById('optionsGroup');
            if (['select', 'checkbox', 'radio'].includes(this.value)) {
                optionsGroup.style.display = 'block';
            } else {
                optionsGroup.style.display = 'none';
            }
        });

        function addField() {
            const type = document.getElementById('fieldType').value;
            const name = document.getElementById('fieldName').value.trim();
            const label = document.getElementById('fieldLabel').value.trim();
            const placeholder = document.getElementById('fieldPlaceholder').value.trim();
            const required = document.getElementById('fieldRequired').checked;
            const optionsStr = document.getElementById('fieldOptions').value.trim();

            if (!name || !label) {
                alert('Пожалуйста, заполните название поля и метку!');
                return;
            }

            let options = [];
            if (['select', 'checkbox', 'radio'].includes(type) && optionsStr) {
                options = optionsStr.split(',').map(opt => opt.trim());
            }

            const field = {
                id: Date.now(),
                type,
                name,
                label,
                placeholder,
                required,
                options
            };

            fields.push(field);
            renderFieldsList();
            renderPreview();
            updateCode();
            
            // Очистка полей ввода
            document.getElementById('fieldName').value = '';
            document.getElementById('fieldLabel').value = '';
            document.getElementById('fieldPlaceholder').value = '';
            document.getElementById('fieldRequired').checked = false;
            document.getElementById('fieldOptions').value = '';
        }

        function removeField(id) {
            fields = fields.filter(f => f.id !== id);
            renderFieldsList();
            renderPreview();
            updateCode();
        }

        function moveField(id, direction) {
            const index = fields.findIndex(f => f.id === id);
            if (index === -1) return;
            
            if (direction === 'up' && index > 0) {
                [fields[index], fields[index - 1]] = [fields[index - 1], fields[index]];
            } else if (direction === 'down' && index < fields.length - 1) {
                [fields[index], fields[index + 1]] = [fields[index + 1], fields[index]];
            }
            
            renderFieldsList();
            renderPreview();
            updateCode();
        }

        function clearAll() {
            if (confirm('Вы уверены, что хотите удалить все поля?')) {
                fields = [];
                renderFieldsList();
                renderPreview();
                updateCode();
            }
        }

        function renderFieldsList() {
            const container = document.getElementById('fieldsList');
            
            if (fields.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">Поля не добавлены</p>';
                return;
            }

            container.innerHTML = fields.map((field, index) => `
                <div class="field-item">
                    <div class="field-header">
                        <strong>${field.label}</strong>
                        <span class="field-type">${field.type}</span>
                    </div>
                    <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                        name: ${field.name}${field.required ? ' • обязательно' : ''}
                    </div>
                    <div>
                        <button onclick="moveField(${field.id}, 'up')" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                        <button onclick="moveField(${field.id}, 'down')" ${index === fields.length - 1 ? 'disabled' : ''}>⬇️</button>
                        <button class="danger" onclick="removeField(${field.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPreview() {
            const container = document.getElementById('previewForm');
            
            if (fields.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">Добавьте поля для предпросмотра</p>';
                return;
            }

            container.innerHTML = fields.map(field => generateFieldHTML(field, true)).join('');
            container.innerHTML += '<button type="submit" style="margin-top: 20px;">Отправить</button>';
        }

        function generateFieldHTML(field, isPreview = false) {
            const requiredAttr = field.required ? 'required' : '';
            const requiredMark = field.required ? ' <span style="color: red;">*</span>' : '';
            
            let inputHTML = '';

            switch (field.type) {
                case 'textarea':
                    inputHTML = `<textarea name="${field.name}" placeholder="${field.placeholder}" ${requiredAttr}></textarea>`;
                    break;
                    
                case 'select':
                    const options = field.options.map(opt => 
                        `<option value="${opt}">${opt}</option>`
                    ).join('\n                        ');
                    inputHTML = `<select name="${field.name}" ${requiredAttr}>
                        <option value="">Выберите...</option>
                        ${options}
                    </select>`;
                    break;
                    
                case 'checkbox':
                    if (field.options.length > 0) {
                        inputHTML = field.options.map(opt => `
                            <div class="checkbox-group">
                                <input type="checkbox" name="${field.name}" value="${opt}" id="${field.name}_${opt.replace(/\s/g, '_')}">
                                <label for="${field.name}_${opt.replace(/\s/g, '_')}" style="display: inline;">${opt}</label>
                            </div>
                        `).join('');
                    } else {
                        inputHTML = `<input type="checkbox" name="${field.name}" ${requiredAttr}>`;
                    }
                    break;
                    
                case 'radio':
                    if (field.options.length > 0) {
                        inputHTML = field.options.map(opt => `
                            <div class="checkbox-group">
                                <input type="radio" name="${field.name}" value="${opt}" id="${field.name}_${opt.replace(/\s/g, '_')}">
                                <label for="${field.name}_${opt.replace(/\s/g, '_')}" style="display: inline;">${opt}</label>
                            </div>
                        `).join('');
                    }
                    break;
                    
                default:
                    inputHTML = `<input type="${field.type}" name="${field.name}" placeholder="${field.placeholder}" ${requiredAttr}>`;
            }

            return `
                <div class="form-group">
                    <label for="${field.name}">${field.label}${requiredMark}</label>
                    ${inputHTML}
                </div>
            `;
        }

        function updateCode() {
            const htmlCode = generateFullHTML();
            const cssCode = generateCSS();
            
            document.getElementById('htmlCode').textContent = htmlCode;
            document.getElementById('cssCode').textContent = cssCode;
        }

        function generateFullHTML() {
            if (fields.length === 0) {
                return '<!-- Добавьте поля формы -->';
            }

            const fieldsHTML = fields.map(field => generateFieldHTML(field)).join('\n        ');
            
            return `<form action="/submit" method="POST">
        ${fieldsHTML}
        <button type="submit">Отправить</button>
    </form>`;
        }

        function generateCSS() {
            return `.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"],
.form-group input[type="number"],
.form-group input[type="tel"],
.form-group input[type="date"],
.form-group input[type="file"],
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.3s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
}

.form-group textarea {
    min-height: 100px;
    resize: vertical;
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

button[type="submit"] {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    width: 100%;
}`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function copyHTML() {
            const html = document.getElementById('htmlCode').textContent;
            navigator.clipboard.writeText(html).then(() => {
                alert('HTML код скопирован в буфер обмена!');
            }).catch(err => {
                console.error('Ошибка копирования:', err);
            });
        }

        function downloadForm() {
            if (fields.length === 0) {
                alert('Сначала добавьте поля формы!');
                return;
            }

            const fullHTML = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сгенерированная форма</title>
    <style>
        ${generateCSS()}
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
    </style>
</head>
<body>
    <form action="/submit" method="POST">
        <h2>Форма</h2>
        ${fields.map(field => generateFieldHTML(field)).join('\n        ')}
        <button type="submit">Отправить</button>
    </form>
</body>
</html>`;

            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'form.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Инициализация
        renderFieldsList();
        updateCode();
    </script>
</body>
</html>
